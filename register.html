<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Void Run</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080c08;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% -5%, rgba(0,255,70,0.12) 0%, transparent 65%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,255,70,0.03) 39px, rgba(0,255,70,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,255,70,0.03) 39px, rgba(0,255,70,0.03) 40px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #e8f0e8;
      padding: 2rem 1rem;
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #fff;
      margin-bottom: 2rem;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0,255,70,0.3);
    }
    .logo span { color: #00ff46; }

    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(0,20,0,0.6);
      border: 1px solid rgba(0,255,70,0.15);
      border-radius: 16px;
      padding: 2.4rem 2rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,70,0.05) inset;
    }

    h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      color: #fff;
    }
    .subtitle {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 1.8rem;
    }

    .step { display: flex; flex-direction: column; gap: 1rem; }

    input {
      width: 100%;
      background: rgba(0,255,70,0.04);
      border: 1px solid rgba(0,255,70,0.15);
      border-radius: 8px;
      padding: 0.78rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: #00ff46;
      box-shadow: 0 0 0 3px rgba(0,255,70,0.1);
    }

    button.primary {
      width: 100%;
      background: #00cc3c;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 1rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(0,204,60,0.3);
    }
    button.primary:hover {
      background: #00ff46;
      box-shadow: 0 4px 28px rgba(0,255,70,0.45);
    }
    button.primary:active { transform: scale(0.98); }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .footer-link {
      margin-top: 1.6rem;
      font-size: 0.83rem;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }
    .footer-link a { color: #00ff46; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    .back-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.35);
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: rgba(0,255,70,0.4); color: #00ff46; }
  </style>
</head>
<body>

  <div class="logo">Void<span>Run</span></div>

  <div class="card">
    <div class="step" id="step-register">
      <h2>Create Account</h2>
      <p class="subtitle">Join the run. No turning back.</p>

      <input id="regUser"  type="text"     placeholder="Username"  autocomplete="username"/>
      <input id="regEmail" type="email"    placeholder="Email"     autocomplete="email"/>
      <input id="regPass"  type="password" placeholder="Password (min 6 chars)" autocomplete="new-password"/>

      <button id="regBtn" class="primary">Create Account</button>
      <label class="terms">
  <input type="checkbox" id="termsCheck">
  <span class="box"></span>
  I agree to the 
  <a href="terms.html">Terms</a> and 
  <a href="privacy.html">Privacy Policy</a>
</label>
    </div>
  </div>

  <div class="footer-link">Already have an account? <a href="login.html">Login</a></div>
  <button class="back-btn" onclick="window.location='index.html'">⬅ Back to Home</button>

  <script src="js/firebase-auth.js"></script>
</body>
</html>
